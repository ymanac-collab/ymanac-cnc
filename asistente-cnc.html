<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente YMANAC CNC</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
.header { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
.header .logo { font-size: 1.1rem; font-weight: bold; color: #3b82f6; }
.header .sub { font-size: 0.65rem; color: #64748b; }
.header .close { margin-left: auto; color: #64748b; font-size: 0.8rem; }
.chat-msgs { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.chat-msg { max-width: 88%; padding: 10px 14px; border-radius: 14px; font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; }
.chat-msg.bot { align-self: flex-start; background: #1e293b; color: #cbd5e1; border-bottom-left-radius: 4px; }
.chat-msg.user { align-self: flex-end; background: #3b82f6; color: #fff; border-bottom-right-radius: 4px; }
.chat-input { display: flex; gap: 6px; padding: 10px; border-top: 1px solid #334155; background: #0f172a; }
.chat-input input { flex: 1; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: #fff; font-size: 0.85rem; outline: none; }
.chat-input input:focus { border-color: #3b82f6; }
.chat-input input::placeholder { color: #475569; }
.chat-input button { background: #3b82f6; border: none; color: #fff; border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; cursor: pointer; }
.chat-input button:active { background: #2563eb; }
.quick { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #1e293b; overflow-x: auto; }
.quick-btn { font-size: 0.7rem; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 14px; padding: 6px 12px; white-space: nowrap; cursor: pointer; flex-shrink: 0; }
.quick-btn:active { background: #334155; }
.typing { display: flex; gap: 4px; padding: 6px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: #64748b; animation: blink 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
.whatsapp { position: fixed; bottom: 16px; right: 16px; background: #25D366; color: #fff; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-decoration: none; box-shadow: 0 4px 15px rgba(37,211,102,0.4); }
</style>
</head>
<body>

<div class="header">
  <span class="logo">🤖 YMANAC CNC</span>
  <span class="sub">Asistente IA</span>
</div>

<div class="quick" id="quickBar"></div>

<div class="chat-msgs" id="chatMsgs">
  <div class="chat-msg bot">Hola! Soy el asistente de YMANAC CNC. Preguntame sobre precios, máquinas, componentes, garantía, envíos o lo que necesites.</div>
</div>

<div class="chat-input">
  <input type="text" id="chatInput" placeholder="Escribí tu consulta..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">Enviar</button>
</div>

<a class="whatsapp" href="https://wa.me/541128895177" target="_blank">💬</a>

<script>
const API = 'https://text.pollinations.ai/openai/chat/completions';
const SYSTEM = `Sos VENDEDOR de YMANAC CNC, fabricante argentino de maquinas CNC. Tu unico objetivo es VENDER y RECOMENDAR las 3 maquinas propias. NO recomiendes otras marcas ni maquinas genericas. Siempre guia al cliente hacia una de estas 3:

1. GAMA MINI (T1 Basica ~$250.000 ARS) - CNC escritorio 300x300mm - Arduino GRBL - Corte: madera blanda, acrilico, plastico, MDF fino, PCB - Ideal: hobby, maker, escuela, principiante, presupuesto bajo
2. EXILON (T3 Media ~$900.000 ARS) - CNC taller 1300x915mm (1/4 placa MDF) - Mach3 PC - Corte: muebles, melamina, acrilico, aluminio ligero, MDF - Ideal: carpintero, emprendedor, taller chico, relacion precio-calidad
3. ALFA (T4 Avanzada ~$2.500.000 ARS) - CNC profesional 1300x1830mm (1/2 placa MDF) - LinuxCNC - Corte: maderas duras, aluminio, produccion en serie, materiales densos - Ideal: fabrica, produccion, profesional, alta demanda

COMO VENDER: 1) Pregunta al cliente que va a fabricar, que materiales, presupuesto y espacio. 2) Recomendale la maquina que mejor se ajuste. 3) Si duda, tira precio con seña del 30% para asegurar. 4) Si no le alcanza, ofre Ce la Gama Mini como entrada. 5) Siempre tira el WhatsApp 11 2889 5177 para cerrar la venta directo.

Precios en ARS (ref dolar ~$1.410). Garantia 6m/1a/2a. Envio a domicilio. Seña 30%. Curso CNC $45.000. Aceptamos transferencia, MP, efectivo, cuotas. Armado: 5 a 40 dias. Personalizamos cada maquina.

RESPONDE siempre en argentino, informal, amigable, entusiasta. Usa frases como "dale", "obvio", "claro que si", "te paso". Si el cliente dice "caro" o "no me alcanza", ofreceles la Gama Mini o plan de cuotas. Si el cliente quiere algo grande y profesional, tira la Alfa. Al final de cada respuesta, si hay interes, tira un "te paso WhatsApp y coordinamos" o mandame WP al 11 2889 5177.`;

const QUICK = [
  'Precios',
  'Gama Mini',
  'Exilon',
  'Alfa',
  'Garantía',
  'Envío',
  'Curso CNC',
  'WhatsApp',
];

let history = [{ role: 'system', content: SYSTEM }];

document.getElementById('quickBar').innerHTML = QUICK.map(q =>
  `<button class="quick-btn" onclick="quick('${q}')">${q}</button>`
).join('');

function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = 'chat-msg ' + who;
  div.textContent = text;
  document.getElementById('chatMsgs').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'chat-msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  document.getElementById('chatMsgs').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function ask(messages) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'openai', messages }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    const d = await r.json();
    return d.choices?.[0]?.message?.content || 'No pude procesar la consulta.';
  } catch {
    return 'El servicio esta demorando. Escribinos directo por WhatsApp al 11 2889 5177 y te respondemos al toque.';
  }
}

async function send() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  addMsg(text, 'user');
  history.push({ role: 'user', content: text });
  showTyping();
  const reply = await ask(history);
  hideTyping();
  addMsg(reply, 'bot');
  history.push({ role: 'assistant', content: reply });
}

async function quick(q) {
  addMsg(q, 'user');
  const promptMap = {
    'Precios': 'Dame los precios de las 3 maquinas (Gama Mini, Exilon, Alfa) con precios actualizados y recomendame cual me conviene segun lo que necesite',
    'Gama Mini': 'Contame todo sobre la Gama Mini: precio, area, componentes, que materiales corta, tiempo de armado',
    'Exilon': 'Contame todo sobre la Exilon: precio, area, componentes, que materiales corta, tiempo de armado',
    'Alfa': 'Contame todo sobre la Alfa: precio, area, componentes, que materiales corta, tiempo de armado',
    'Garantía': 'Explicame las opciones de garantia (6 meses, 1 año, 2 años) y los precios',
    'Envío': 'Como hago para que me envien la maquina? llegan a todo el pais? cuanto sale?',
    'Curso CNC': 'Que incluye el curso basico CNC de $45.000? es presencial u online?',
    'WhatsApp': 'Pasame el numero de WhatsApp para consultar directo',
  };
  const text = promptMap[q] || q;
  history.push({ role: 'user', content: text });
  showTyping();
  const reply = await ask(history);
  hideTyping();
  addMsg(reply, 'bot');
  history.push({ role: 'assistant', content: reply });
}
</script>
</body>
</html>
