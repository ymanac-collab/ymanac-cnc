<style>

  .screen-card .hint { font-size: 0.75rem; color: #8b949e; margin-bottom: 12px; }
  .comp-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .comp-card .name { font-size: 0.8rem; font-weight: bold; color: #c9d1d9; padding-right: 40px; }
  .comp-card .specs { font-size: 0.65rem; color: #8b949e; margin-top: 3px; line-height: 1.3; }
  .comp-card .price { font-size: 0.7rem; color: #58a6ff; margin-top: 4px; }
  .comp-card .tier { position: absolute; top: 5px; right: 5px; font-size: 0.55rem; padding: 1px 6px; border-radius: 8px; }
  .tier-1 { background: #3fb950; color: #0d1117; }
  .tier-2 { background: #d29922; color: #0d1117; }
  .tier-3 { background: #f78166; color: #0d1117; }
  .tier-4 { background: #da3633; color: #fff; }
  .tier-5 { background: #8957e5; color: #fff; }


  .login-screen { max-width: 340px; margin: 40px auto; }
  .login-screen h2 { color: #58a6ff; text-align: center; margin-bottom: 15px; font-size: 1.1rem; }

  .admin-panel { background: #161b22; border: none; border-radius: 12px; padding: 25px; width: 100%; }

  .btn { padding: 10px 22px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.25s ease; display: inline-flex; align-items: center; gap: 6px; }
  .presets { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }

  .preset-card .p-area { font-size: 0.65rem; color: #8b949e; margin-top: 2px; }
  .preset-card .p-price { font-size: 0.75rem; color: #58a6ff; margin-top: 4px; font-weight: bold; }
  .preset-card .p-tier { font-size: 0.55rem; padding: 1px 8px; border-radius: 8px; display: inline-block; }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-primary { background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; box-shadow: 0 4px 15px rgba(59,130,246,0.3); }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 25px rgba(59,130,246,0.5); }
  .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-secondary:hover:not(:disabled) { background: #30363d; border-color: #58a6ff; }
  .summary-item { padding: 6px 0; border-bottom: 1px solid #21262d; font-size:0.8rem; }
  .summary-item:last-child { border-bottom: none; }
  .qty-control { display: inline-flex; align-items: center; gap: 4px; float: right; }
  .qty-btn { width: 24px; height: 24px; border-radius: 4px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .qty-btn:hover { background: #30363d; border-color: #58a6ff; }
  .qty-inp { width: 36px; text-align: center; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 4px; padding: 2px; font-size: 0.8rem; }

  .summary-box { background: linear-gradient(145deg,rgba(22,27,34,0.95),rgba(13,17,23,0.95)); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-radius: 12px; padding: 20px; border: 1px solid #21262d; box-shadow:0 4px 20px rgba(0,0,0,0.2); }

  .lab-ship input { width:100%; padding:7px 10px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; border-radius:6px; font-size:0.8rem; font-family:inherit; }
  .lab-ship input:focus { outline:none; border-color:#58a6ff; }
  .nivel-bar { height:6px; background:#1e2530; border-radius:3px; margin:8px 0; overflow:hidden; }
  .nivel-fill { height:100%; border-radius:3px; transition:width 0.3s; }
  .summary-nivel { text-align:center; font-size:0.75rem; color:#8b949e; margin-bottom:4px; }
  .bom { margin-top:8px; font-size:0.7rem; color:#8b949e; }
  .bom-item { padding:2px 0; }
  .comp-card { flex:1; min-width:130px; background:linear-gradient(145deg,rgba(13,17,23,0.9),rgba(22,27,34,0.8)); border:1px solid #21262d; border-radius:10px; padding:12px; cursor:pointer; transition:all 0.2s; position:relative; }
  .comp-card:hover { border-color:#58a6ff; transform:translateY(-2px); box-shadow:0 4px 15px rgba(59,130,246,0.1); }

</head>
<body>

<div class="container">
  <h1>⚙ Configurador CNC</h1>
  <p class="subtitle">Seleccioná cada componente paso a paso — compatibilidad asegurada</p>
  <div style="text-align:center;margin-bottom:12px;"><a href="index.html" style="color:#8b949e;font-size:0.7rem;text-decoration:none;">← Volver al inicio</a></div>

  <div class="admin-bar">
    <button onclick="loginAdmin()" id="adminBtn">🔐 Admin</button>
    <button onclick="toggleMoneda()" id="monedaBtn">💵 ARS</button>
    <button onclick="openAdminPanel()" id="panelBtn" style="display:none;">💰 Admin Precios</button>
  </div>

  <div class="presets" id="presetsBar"></div>

  <div class="step-nav" id="stepNav"></div>

  <div id="screens"></div>

  <div class="nav-buttons" id="navButtons">
    <button class="btn btn-secondary" onclick="prevStep()" id="btnPrev">← Atrás</button>
    <span class="spacer"></span>
    <button class="btn btn-primary" onclick="nextStep()" id="btnNext">Siguiente →</button>
  </div>

  <div id="summaryScreen" class="step-screen">
    <div class="summary-box">
      <h2 style="color:#58a6ff;font-size:1rem;margin-bottom:10px;">📋 Resumen final</h2>
      <div id="summaryItems"></div>
      <div class="lab-ship">
        <div><label>✋ Mano de obra (%)</label><input type="number" id="laborPct" value="30" min="0" max="200" onchange="renderSummary()"></div>
        <div><label>🚚 Envío por item ($)</label><input type="number" id="shipCost" value="8000" min="0" step="500" onchange="renderSummary()"></div>
      </div>
      <div class="nivel-bar"><div class="nivel-fill" id="nivelFill" style="width:0%;background:#3fb950;"></div></div>
      <div class="summary-nivel" id="nivelLabel">🟢 Nivel: —</div>
      <div id="subtotals" style="font-size:0.75rem;color:#8b949e;text-align:center;padding:4px 0;"></div>
      <div class="summary-total" id="totalPrice">$0</div>
      <div style="text-align:center;font-size:0.7rem;color:#484f58;">Total final (componentes + MO + envíos)</div>
      <div class="bom" id="bom"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="showRecibo()">📄 Generar recibo de seña</button>
      <button class="btn btn-secondary" style="width:100%;margin-top:6px;" onclick="resetAll()">🔄 Reiniciar</button>
    </div>
  </div>

  <div id="reciboScreen" class="step-screen">
    <div class="screen-card">
      <h2>📄 Recibo de seña — YMANAC CNC</h2>
      <div style="margin-top:12px;">
        <label style="font-size:0.8rem;color:#8b949e;">Cliente</label>
        <input id="recCliente" class="rec-input" placeholder="Nombre y apellido">
        <label style="font-size:0.8rem;color:#8b949e;">DNI / CUIL</label>
        <input id="recDni" class="rec-input" placeholder="DNI o CUIL">
        <label style="font-size:0.8rem;color:#8b949e;">Teléfono</label>
        <input id="recTel" class="rec-input" placeholder="Teléfono / WhatsApp">
        <label style="font-size:0.8rem;color:#8b949e;">Seña pagada ($)</label>
        <input id="recMonto" class="rec-input" type="number" min="0" step="100" placeholder="Ej: 50000">
        <label style="font-size:0.8rem;color:#8b949e;">Firma del cliente</label>
        <canvas id="sigCanvas" width="500" height="150" style="width:100%;height:100px;background:#0d1117;border:1px solid #30363d;border-radius:6px;cursor:crosshair;touch-action:none;"></canvas>
        <div class="btn-row" style="margin-top:6px;">
          <button class="btn btn-secondary" onclick="clearSig()">🗑 Borrar firma</button>
        </div>
        <div class="btn-row" style="margin-top:15px;">
          <button class="btn btn-secondary" onclick="hideRecibo()">← Volver</button>
          <button class="btn btn-primary" onclick="genPDF()">📄 Generar PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
.rec-input { width:100%; padding:10px; margin-bottom:8px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; border-radius:6px; font-size:0.9rem; }
.rec-input:focus { outline:none; border-color:#58a6ff; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- MODAL PANEL ADMIN -->
<div class="modal-overlay" id="adminPanelModal" onclick="closeAdminPanel()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="admin-panel" id="adminPanelBody"></div>
  </div>
</div>

function cloneData(src) { return JSON.parse(JSON.stringify(src)); }
function deepMerge(base, overrides) {
  const r = cloneData(base);
  for (const cat of Object.keys(r)) {
    for (let i = 0; i < r[cat].length; i++) {
      const key = cat + '::' + r[cat][i].id;
      if (overrides[key] !== undefined) r[cat][i].price = overrides[key];
    }
  }
  return r;
}
function loadOverrides() {
  try { return JSON.parse(localStorage.getItem('cnc_price_overrides') || '{}'); } catch(e) { return {}; }
}
function saveOverrides(overrides) {
  localStorage.setItem('cnc_price_overrides', JSON.stringify(overrides));
}
function getData() { return deepMerge(BASE_DATA, loadOverrides()); }

let selected = {};
let currentStep = 0;
let isAdmin = false;
let moneda = 'ARS';
function getTierLabel(t) { return ['','Básico','Económico','Medio','Avanzado','Profesional'][t] || ''; }
function getTierColor(t) { return ['','#3fb950','#d29922','#f78166','#da3633','#8957e5'][t] || '#3fb950'; }

function isCompatible(data, cat, itemId) {
  const item = data[cat].find(i => i.id === itemId);
  if (!item) return false;
  for (const [otherCat, otherId] of Object.entries(selected)) {
    if (otherCat === cat || !otherId) continue;
    const other = data[otherCat].find(i => i.id === otherId);
    if (!other) return false;
    const ic = item.compat && item.compat[otherCat];
    const oc = other.compat && other.compat[cat];
    if (ic && !ic.includes(otherId)) return false;
    if (oc && !oc.includes(itemId)) return false;
  }
  return true;
}

function selectComp(cat, id) {
  const data = getData();
  if (!isCompatible(data, cat, id)) return;
  selected[cat] = id;
  renderScreen();
  renderNav();
  if (currentStep < CATEGORIES.length - 1 && CATEGORIES[currentStep] === cat) {
    setTimeout(nextStep, 300);
  }
}

function getQty(cat) {
  return parseInt(document.getElementById('qty_' + cat)?.value) || QTYS[cat] || 1;
}

function getTotal() {
  const data = getData();
  let t = 0;
  for (const [cat, id] of Object.entries(selected)) {
    const item = data[cat]?.find(i => i.id === id);
    if (item) t += item.price * getQty(cat);
  }
  return t;
}

function getAvgTier() {
  const tiers = Object.values(selected).map(id => {
    for (const cat of CATEGORIES) { const i = getData()[cat].find(x => x.id === id); if (i) return i.tier; }
    return 0;
  });
  return tiers.length ? tiers.reduce((a,b) => a+b, 0) / tiers.length : 0;
}

function fmtP(p) {
  if (moneda === 'USD') {
    const rate = parseFloat(localStorage.getItem('cnc_usd_rate') || '1410');
    return 'USD ' + Math.round(p / rate).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  }
  return '$' + Math.round(p).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.') + ' ARS';
}

function init() {
  const screens = document.getElementById('screens');
  screens.innerHTML = CATEGORIES.map((cat, i) => `
    <div class="step-screen" id="screen${i}">
      <div class="screen-card">
        <h2>${CAT_ICONS[cat]} ${CAT_LABELS[cat]} <span style="font-size:0.7rem;color:#8b949e;font-weight:400;">(${i+1}/${CATEGORIES.length})</span></h2>
        <div class="hint">Seleccioná el ${CAT_LABELS[cat].toLowerCase()} compatible. Los incompatibles se ven atenuados.</div>
        <div class="comp-row" id="row${i}"></div>
      </div>
    </div>
  `).join('');
  renderPresets();
  renderNav();
  renderScreen();
}

function renderPresets() {
  const data = getData();
  const bar = document.getElementById('presetsBar');
  bar.innerHTML = PRESETS.map(p => {
    let total = 0;
    let ok = true;
    for (const [cat, id] of Object.entries(p.comps)) {
      const item = data[cat]?.find(i => i.id === id);
      if (!item) { ok = false; break; }
      total += item.price * QTYS[cat];
    }
    const col = ['','#3fb950','#d29922','#f78166','#da3633','#8957e5'][p.tier] || '#3fb950';
    const tierLbl = ['','Básico','Económico','Medio','Avanzado','Profesional'][p.tier] || '';
    return `<div class="preset-card" onclick="selectPreset('${p.id}')">
      <div class="p-name"><span>${p.icon}</span> ${p.name} <span class="p-tier" style="background:${col};">${tierLbl}</span></div>
      <div class="p-area">${p.area} · ${p.desc}</div>
      <div class="p-price">${fmtP(total)}</div>
    </div>`;
  }).join('');
}

function selectPreset(id) {
  const p = PRESETS.find(x => x.id === id);
  if (!p) return;
  selected = {};
  for (const [cat, id] of Object.entries(p.comps)) {
    selected[cat] = id;
  }
  currentStep = CATEGORIES.length;
  document.querySelectorAll('.step-screen').forEach(el => el.classList.remove('active'));
  document.getElementById('summaryScreen').classList.add('active');
  renderSummary();
  renderNav();
  renderPresets();
}

function renderScreen() {
  const data = getData();
  CATEGORIES.forEach((cat, i) => {
    const sel = selected[cat];
    const row = document.getElementById('row' + i);
    if (!row) return;
    row.innerHTML = data[cat].map(item => {
      const compat = isCompatible(data, cat, item.id);
      const isSel = sel === item.id;
      const locked = !compat && !isSel;
      return `<div class="comp-card ${isSel?'selected':''} ${locked?'incompatible':''}" onclick="${locked?'':`selectComp('${cat}','${item.id}')`}">
        <span class="tier tier-${item.tier}">T${item.tier}</span>
        <div class="name">${item.name}</div>
        <div class="specs">${item.specs}</div>
        <div class="price">${fmtP(item.price)}</div>
      </div>`;
    }).join('');
  });
  renderPresets();
}

function renderNav() {
  const nav = document.getElementById('stepNav');
  nav.innerHTML = CATEGORIES.map((cat, i) => {
    const sel = selected[cat];
    const cls = sel ? 'done' : (i === currentStep ? 'active' : '');
    return `<div class="step-dot ${cls}" onclick="goStep(${i})"><span class="num">${i+1}</span>${CAT_LABELS[cat].split(' ')[0]}${sel ? ' ✓' : ''}</div>`;
  }).join('');
  document.getElementById('btnPrev').disabled = currentStep === 0;
  const isLast = currentStep >= CATEGORIES.length - 1;
  document.getElementById('btnNext').textContent = isLast ? '📋 Ver resumen' : 'Siguiente →';
  document.getElementById('btnNext').disabled = false;

  document.querySelectorAll('.step-screen').forEach(el => el.classList.remove('active'));
  if (currentStep < CATEGORIES.length) {
    document.getElementById('screen' + currentStep).classList.add('active');
  } else {
    document.getElementById('summaryScreen').classList.add('active');
  }
}

function goStep(n) {
  if (n < 0) n = 0;
  if (n >= CATEGORIES.length) {
    currentStep = CATEGORIES.length;
    document.querySelectorAll('.step-screen').forEach(el => el.classList.remove('active'));
    document.getElementById('summaryScreen').classList.add('active');
    renderSummary();
    renderNav();
    return;
  }
  currentStep = n;
  renderNav();
  renderScreen();
}

function nextStep() {
  if (currentStep >= CATEGORIES.length - 1) {
    goStep(CATEGORIES.length);
  } else {
    goStep(currentStep + 1);
  }
}

function prevStep() {
  goStep(currentStep - 1);
}

function summarizeLine(cat) {
  const data = getData();
  const id = selected[cat];
  if (!id) return null;
  const item = data[cat]?.find(i => i.id === id);
  if (!item) return null;
  const qty = getQty(cat);
  const sub = item.price * qty;
  return { cat: CAT_LABELS[cat], icon: CAT_ICONS[cat], name: item.name, price: item.price, qty, sub };
}

function renderSummary() {
  const data = getData();
  const total = getTotal();
  const avg = getAvgTier();
  const tier = Math.max(1, Math.min(5, Math.round(avg)));
  const items = document.getElementById('summaryItems');
  const lines = CATEGORIES.map(cat => summarizeLine(cat)).filter(Boolean);
  items.innerHTML = lines.map(l => `
    <div class="summary-item">
      <span style="color:#8b949e;">${l.icon} ${l.cat}:</span>
      <span>${l.name}</span>
      <span class="qty-control">
        <button class="qty-btn" onclick="chgQty('${l.cat}',-1)">−</button>
        <input class="qty-inp" id="qty_${l.cat}" type="number" value="${l.qty}" min="1" max="99" onchange="renderSummary()">
        <button class="qty-btn" onclick="chgQty('${l.cat}',1)">+</button>
        <span style="color:#58a6ff;min-width:80px;text-align:right;display:inline-block;">${fmtP(l.sub)}</span>
      </span>
    </div>`).join('');
  const bom = lines.map(l => ({ cat: l.cat, name: l.name, price: l.price, qty: l.qty }));
  const itemCount = bom.reduce((s, l) => s + l.qty, 0);
  const laborPct = parseFloat(document.getElementById('laborPct').value) || 0;
  const shipPerItem = parseFloat(document.getElementById('shipCost').value) || 0;
  const laborCost = Math.round(total * laborPct / 100);
  const shipCost = Math.round(itemCount * shipPerItem);
  const grandTotal = total + laborCost + shipCost;
  document.getElementById('totalPrice').textContent = fmtP(grandTotal);
  document.getElementById('subtotals').textContent = `Componentes: ${fmtP(total)} · MO (${laborPct}%): ${fmtP(laborCost)} · Envíos (${itemCount}×): ${fmtP(shipCost)}`;
  document.getElementById('nivelFill').style.width = `${(avg / 5) * 100}%`;
  document.getElementById('nivelFill').style.background = getTierColor(tier);
  document.getElementById('nivelLabel').textContent = `${['','🟢','🟡','🟠','🔴','🟣'][tier]} Nivel: ${getTierLabel(tier)}`;
  const bomDiv = document.getElementById('bom');
  bomDiv.innerHTML = bom.length ? '<div style="font-size:0.75rem;color:#8b949e;">📦 BOM:</div>' + bom.map((b, i) =>
    `<div class="bom-item">${i+1}. ${b.cat} → ${b.name} ×${b.qty}</div>`
  ).join('') : '';
}

function chgQty(cat, delta) {
  const inp = document.getElementById('qty_' + cat);
  if (!inp) return;
  let v = parseInt(inp.value) || QTYS[cat] || 1;
  v = Math.max(1, Math.min(99, v + delta));
  inp.value = v;
  renderSummary();
}

function resetAll() {
  selected = {};
  currentStep = 0;
  renderNav();
  renderScreen();
  goStep(0);
}

function toggleMoneda() {
  moneda = moneda === 'ARS' ? 'USD' : 'ARS';
  document.getElementById('monedaBtn').textContent = moneda === 'ARS' ? '💵 ARS' : '💵 USD';
  renderScreen();
  if (currentStep >= CATEGORIES.length) renderSummary();
}

function loginAdmin() {
  if (isAdmin) {
    if (document.getElementById('adminPanelModal').classList.contains('open')) saveAdminPrices();
    isAdmin = false;
    document.getElementById('adminBtn').textContent = '🔐 Admin';
    document.getElementById('panelBtn').style.display = 'none';
    renderScreen();
    return;
  }
  const user = prompt('Usuario:');
  if (user !== ADMIN_USER) { alert('Usuario incorrecto'); return; }
  const pass = prompt('Contraseña:');
  if (pass !== ADMIN_PASS) { alert('Contraseña incorrecta'); return; }
  isAdmin = true;
  document.getElementById('adminBtn').textContent = '🔓 Cerrar Admin';
  document.getElementById('panelBtn').style.display = 'inline-block';
  renderScreen();
}

function openAdminPanel() {
  const data = getData();
  const overrides = loadOverrides();
  let html = '<h2>💰 Panel de Precios — Admin</h2>';
  for (const cat of CATEGORIES) {
    html += `<h3>${CAT_ICONS[cat]} ${CAT_LABELS[cat]}</h3>`;
    for (const item of data[cat]) {
      const key = cat + '::' + item.id;
      const val = overrides[key] !== undefined ? overrides[key] : item.price;
      html += `<div class="admin-row">
        <span class="ar-name">${item.name}</span>
        <span class="ar-tier" style="background:${getTierColor(item.tier)}">T${item.tier}</span>
        <input class="ar-price" type="number" min="0" step="100" data-key="${key}" value="${val}">
        <span class="ar-unit">ARS</span>
      </div>`;
    }
  }
  html += `<div class="btn-row">
    <button class="btn btn-secondary" onclick="closeAdminPanel()">Cancelar</button>
    <button class="btn btn-secondary" onclick="exportPrices()">📤 Exportar JSON</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📥 Importar JSON</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importPrices(event)">
    <button class="btn btn-primary" onclick="saveAdminPrices()">💾 Guardar todo</button>
  </div>`;
  document.getElementById('adminPanelBody').innerHTML = html;
  document.getElementById('adminPanelModal').classList.add('open');
}

function closeAdminPanel() {
  document.getElementById('adminPanelModal').classList.remove('open');
}

function saveAdminPrices() {
  const overrides = {};
  document.querySelectorAll('.ar-price').forEach(inp => {
    const v = parseFloat(inp.value);
    if (!isNaN(v) && v >= 0) overrides[inp.dataset.key] = v;
  });
  saveOverrides(overrides);
  closeAdminPanel();
  renderScreen();
  if (currentStep >= CATEGORIES.length) renderSummary();
}

function exportPrices() {
  const overrides = loadOverrides();
  const blob = new Blob([JSON.stringify(overrides, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'precios-cnc.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importPrices(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      saveOverrides(data);
      renderScreen();
      if (currentStep >= CATEGORIES.length) renderSummary();
      document.getElementById('importFile').value = '';
      alert('✅ Precios importados correctamente');
      if (document.getElementById('adminPanelModal').classList.contains('open')) openAdminPanel();
    } catch(err) {
      alert('❌ Error al leer el archivo JSON');
    }
  };
  reader.readAsText(file);
}

let sigData = null;

function showRecibo() {
  document.querySelectorAll('.step-screen').forEach(el => el.classList.remove('active'));
  document.getElementById('reciboScreen').classList.add('active');
  document.getElementById('navButtons').style.display = 'none';
  setupSig();
}

function hideRecibo() {
  document.getElementById('reciboScreen').classList.remove('active');
  document.getElementById('summaryScreen').classList.add('active');
  document.getElementById('navButtons').style.display = '';
}

function setupSig() {
  const c = document.getElementById('sigCanvas');
  c.width = c.offsetWidth * 2;
  c.height = c.offsetHeight * 2;
  const ctx = c.getContext('2d');
  ctx.scale(2, 2);
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  let drawing = false;
  function start(e) { drawing = true; const p = pos(e, c); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
  function move(e) { if (!drawing) return; const p = pos(e, c); ctx.lineTo(p.x, p.y); ctx.stroke(); }
  function end() { drawing = false; sigData = c.toDataURL(); }
  function pos(e, el) {
    const r = el.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: (t.clientX - r.left), y: (t.clientY - r.top) };
  }
  c.onmousedown = start; c.onmousemove = move; c.onmouseup = end; c.onmouseleave = end;
  c.ontouchstart = start; c.ontouchmove = move; c.ontouchend = end;
}

function clearSig() {
  const c = document.getElementById('sigCanvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  sigData = null;
}

function genPDF() {
  const nom = document.getElementById('recCliente').value.trim();
  const dni = document.getElementById('recDni').value.trim();
  const tel = document.getElementById('recTel').value.trim();
  const seña = parseFloat(document.getElementById('recMonto').value) || 0;
  if (!nom) { alert('Ingresá el nombre del cliente'); return; }
  if (seña <= 0) { alert('Ingresá el monto de la seña'); return; }

  const data = getData();
  const total = getTotal();
  const laborPct = parseFloat(document.getElementById('laborPct').value) || 0;
  const shipPerItem = parseFloat(document.getElementById('shipCost').value) || 0;
  const bom = CATEGORIES.map(cat => {
    const id = selected[cat];
    if (!id) return null;
    const item = data[cat]?.find(i => i.id === id);
    if (!item) return null;
    return { cat: CAT_LABELS[cat], name: item.name, price: item.price, qty: getQty(cat) };
  }).filter(Boolean);
  const itemCount = bom.reduce((s, b) => s + b.qty, 0);
  const laborCost = Math.round(total * laborPct / 100);
  const shipCost = Math.round(itemCount * shipPerItem);
  const grandTotal = total + laborCost + shipCost;
  const saldo = grandTotal - seña;
  const fecha = new Date().toLocaleDateString('es-AR');
  const nro = Math.floor(Math.random() * 9000) + 1000;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const w = 190;
  let y = 15;

  function clean(t) { return t.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/ñ/g,'n').replace(/Ñ/g,'N').replace(/á/g,'a').replace(/Á/g,'A').replace(/é/g,'e').replace(/É/g,'E').replace(/í/g,'i').replace(/Í/g,'I').replace(/ó/g,'o').replace(/Ó/g,'O').replace(/ú/g,'u').replace(/Ú/g,'U'); }
  function tx(s, x, sz, st, c) { doc.setFont('Helvetica', st || 'normal'); doc.setFontSize(sz || 9); doc.setTextColor(c || 139, 148, 158); doc.text(clean(s), x, y, {}); }
  function ln(yy) { doc.setDrawColor(48, 54, 61); doc.line(10, yy, 200, yy); }

  doc.setFillColor(10, 17, 23);
  doc.rect(0, 0, 210, 297, 'F');

  tx('YMANAC CNC', w/2, 14, 'bold', [88,166,255]); y += 9;
  tx('ymanac-cnc.com.ar  |  WhatsApp: 1128895177', w/2, 8, 'normal', [100,110,120]); y += 3;
  ln(y); y += 5;

  tx('RECIBO DE SEÑA NRO ' + nro, w/2, 12, 'bold', [88,166,255]); y += 8;
  tx('Fecha: ' + fecha, 10, 8, 'normal', [150,155,160]); y += 5;
  ln(y); y += 6;

  tx('DATOS DEL CLIENTE', 10, 10, 'bold', [190,200,210]); y += 7;
  tx('Nombre: ' + nom, 15, 9, 'normal', [150,155,160]); y += 5;
  tx('DNI/CUIL: ' + (dni || '-'), 15, 9); y += 5;
  tx('Telefono: ' + (tel || '-'), 15, 9); y += 5;
  ln(y); y += 6;

  tx('MAQUINA CONFIGURADA', 10, 10, 'bold', [190,200,210]); y += 7;
  for (const b of bom) {
    tx(b.cat + ': ' + b.name + ' x' + b.qty, 15, 8); y += 4.5;
    if (y > 270) { doc.addPage(); y = 15; doc.setFillColor(10,17,23); doc.rect(0,0,210,297,'F'); }
  }
  y += 2;
  ln(y); y += 6;

  tx('RESUMEN ECONOMICO', 10, 10, 'bold', [190,200,210]); y += 7;
  const lines = [
    ['Componentes:', '$' + total.toLocaleString('es-AR')],
    ['Mano de obra (' + laborPct + '%):', '$' + laborCost.toLocaleString('es-AR')],
    ['Envio (' + itemCount + ' items):', '$' + shipCost.toLocaleString('es-AR')],
    ['', ''],
    ['TOTAL', '$' + grandTotal.toLocaleString('es-AR')],
    ['Sena pagada', '$' + seña.toLocaleString('es-AR')],
    ['Saldo pendiente', '$' + saldo.toLocaleString('es-AR')],
  ];
  for (const l of lines) {
    if (l[0] === '') { y += 2; continue; }
    const st = (l[0]==='TOTAL'||l[0]==='Saldo pendiente') ? 'bold' : (l[0]==='Sena pagada' ? 'bold' : 'normal');
    const co = (l[0]==='TOTAL'||l[0]==='Saldo pendiente') ? [88,166,255] : (l[0]==='Sena pagada' ? [63,185,80] : [139,148,158]);
    tx(l[0], 15, 9, st, co);
    tx(l[1], w, 9, st, co);
    y += 5.5;
  }
  y += 3;
  ln(y); y += 6;

  tx('FIRMAS', 10, 10, 'bold', [190,200,210]); y += 10;
  doc.setDrawColor(100,110,120); doc.line(15, y, 80, y);
  tx('Cliente: ' + nom, 15, 8, 'normal', [139,148,158]);
  if (sigData) doc.addImage(sigData, 'PNG', w-80, y-10, 60, 18);
  y += 11;
  doc.line(15, y, 80, y);
  tx('YMANAC CNC', 15, 8); y += 12;

  tx('Documento no valido como factura. Recibo de sena por compra de maquina CNC.', w/2, 7, 'normal', [50,55,60]);

  doc.save('recibo-sena-ymanac-n' + nro + '.pdf');
}

init();
</script>
