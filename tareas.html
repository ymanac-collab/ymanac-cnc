<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>YMANAC - Gestor de Tareas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0a0e14; color:#c9d1d9; padding:16px; min-height:100vh; }
.container { max-width:800px; margin:0 auto; }
h1 { text-align:center; color:#58a6ff; font-size:1.2rem; margin-bottom:4px; display:flex; align-items:center; justify-content:center; gap:8px; }
.subtitle { text-align:center; color:#8b949e; font-size:0.7rem; margin-bottom:16px; }

/* Filtros día */
.day-filters { display:flex; gap:4px; margin-bottom:12px; overflow-x:auto; padding-bottom:4px; }
.day-btn { padding:6px 14px; border-radius:8px; font-size:0.7rem; font-weight:600; cursor:pointer; border:1px solid #30363d; background:#111820; color:#8b949e; white-space:nowrap; transition:all 0.2s; flex-shrink:0; }
.day-btn.active { background:#58a6ff; color:#fff; border-color:#58a6ff; }
.day-btn:hover:not(.active) { border-color:#58a6ff; color:#c9d1d9; }

/* Formulario */
.form-card { background:#111820; border:1px solid #1e2530; border-radius:12px; padding:14px; margin-bottom:12px; }
.form-row { display:flex; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.form-row:last-child { margin-bottom:0; }
.form-row input, .form-row select { padding:9px 12px; background:#0a0e14; border:1px solid #30363d; border-radius:8px; color:#c9d1d9; font-size:0.8rem; font-family:inherit; flex:1; min-width:0; }
.form-row input:focus, .form-row select:focus { outline:none; border-color:#58a6ff; }
.form-row input[type="time"] { flex:0 0 100px; }
.form-row input[type="date"] { flex:0 0 140px; }
.days-grid { display:flex; gap:4px; flex-wrap:wrap; }
.day-pill { padding:5px 10px; border-radius:6px; font-size:0.7rem; font-weight:600; cursor:pointer; border:1px solid #30363d; background:#0a0e14; color:#8b949e; transition:all 0.2s; }
.day-pill.on { background:#3fb950; color:#fff; border-color:#3fb950; }
.btn-add { padding:9px 20px; border-radius:8px; font-size:0.8rem; font-weight:600; cursor:pointer; border:none; background:linear-gradient(135deg,#3b82f6,#06b6d4); color:#fff; transition:all 0.2s; white-space:nowrap; }
.btn-add:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(59,130,246,0.3); }

/* Lista */
.task-list { display:flex; flex-direction:column; gap:6px; }
.task-card { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#111820; border:1px solid #1e2530; border-radius:10px; transition:all 0.2s; }
.task-card.done { opacity:0.55; }
.task-card.done .task-name { text-decoration:line-through; color:#484f58; }
.task-toggle { width:28px; height:28px; border-radius:50%; border:2px solid #30363d; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.7rem; color:transparent; transition:all 0.2s; flex-shrink:0; background:transparent; }
.task-toggle.on { background:#3fb950; border-color:#3fb950; color:#fff; }
.task-info { flex:1; min-width:0; }
.task-name { font-size:0.8rem; font-weight:600; color:#c9d1d9; }
.task-meta { font-size:0.65rem; color:#8b949e; margin-top:2px; display:flex; gap:6px; flex-wrap:wrap; }
.task-meta .tag { padding:1px 6px; border-radius:4px; background:#1e2530; }
.task-actions { display:flex; gap:4px; flex-shrink:0; }
.task-btn { width:28px; height:28px; border-radius:6px; border:1px solid #30363d; background:#0a0e14; color:#8b949e; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.7rem; transition:all 0.2s; }
.task-btn:hover { border-color:#58a6ff; color:#c9d1d9; background:#111820; }
.task-btn.del:hover { border-color:#da3633; color:#da3633; }

/* Modal edición */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:999; align-items:center; justify-content:center; padding:16px; }
.modal-overlay.open { display:flex; }
.modal { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:20px; width:100%; max-width:500px; }
.modal h2 { font-size:0.95rem; color:#58a6ff; margin-bottom:12px; }
.modal .btn-row { display:flex; gap:8px; margin-top:12px; justify-content:flex-end; }

/* Empty state */
.empty-state { text-align:center; padding:40px 20px; color:#484f58; }
.empty-state .icon { font-size:2.5rem; margin-bottom:10px; }
.empty-state p { font-size:0.8rem; }

/* Stats */
.stats { display:flex; gap:12px; margin-bottom:10px; font-size:0.7rem; color:#8b949e; justify-content:center; }
.stats span { display:flex; align-items:center; gap:4px; }

@media(max-width:500px) {
  .form-row { flex-direction:column; }
  .form-row input[type="time"], .form-row input[type="date"] { flex:1; }
  .day-filters { gap:3px; }
  .day-btn { padding:5px 10px; font-size:0.65rem; }
}
</style>
</head>
<body>
<div class="container">
  <h1>📋 Tareas</h1>
  <p class="subtitle">Gestioná tus tareas con días, horarios y estado</p>

  <div class="stats" id="stats"></div>

  <div class="day-filters" id="dayFilters"></div>

  <div class="form-card">
    <div class="form-row">
      <input id="taskName" placeholder="Nombre de la tarea" maxlength="60">
      <input type="time" id="taskTime" value="09:00">
    </div>
    <div class="form-row">
      <input type="date" id="taskDate">
      <select id="taskPriority"><option value="baja">Baja</option><option value="media" selected>Media</option><option value="alta">Alta</option></select>
    </div>
    <div class="form-row">
      <div class="days-grid" id="daySelector"></div>
    </div>
    <div class="form-row" style="justify-content:flex-end;">
      <button class="btn-add" onclick="addTask()">+ Agregar tarea</button>
    </div>
  </div>

  <div class="task-list" id="taskList"></div>
</div>

<!-- Modal editar -->
<div class="modal-overlay" id="editModal" onclick="closeEdit()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>✏️ Editar tarea</h2>
    <div class="form-row"><input id="editName" placeholder="Nombre"></div>
    <div class="form-row">
      <input type="time" id="editTime">
      <input type="date" id="editDate">
      <select id="editPriority"><option value="baja">Baja</option><option value="media" selected>Media</option><option value="alta">Alta</option></select>
    </div>
    <div class="form-row"><div class="days-grid" id="editDaySelector"></div></div>
    <div class="btn-row">
      <button class="task-btn" onclick="closeEdit()" style="padding:8px 16px;width:auto;border-radius:8px;">Cancelar</button>
      <button class="btn-add" onclick="saveEdit()" style="padding:8px 16px;">Guardar</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DAYS_FULL = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

let tasks = JSON.parse(localStorage.getItem('ymanac_tasks') || '[]');
let filterDay = -1; // -1 = todos
let editingId = null;

function save() {
  localStorage.setItem('ymanac_tasks', JSON.stringify(tasks));
}

function today() { return new Date().toISOString().split('T')[0]; }

function nextId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function dayNames(bits) {
  if (!bits || bits === 0) return 'Sin días';
  return DAYS.filter((_,i) => bits & (1<<i)).join(', ');
}

function initDaySelector(containerId, bits, onChange) {
  const el = document.getElementById(containerId);
  el.innerHTML = DAYS.map((d,i) => {
    const on = bits & (1<<i);
    return `<span class="day-pill ${on?'on':''}" data-i="${i}">${d}</span>`;
  }).join('');
  el.querySelectorAll('.day-pill').forEach(p => {
    p.onclick = () => {
      p.classList.toggle('on');
      if (onChange) onChange();
    };
  });
}

function getBits(containerId) {
  let b = 0;
  document.querySelectorAll(`#${containerId} .day-pill`).forEach(p => {
    if (p.classList.contains('on')) b |= 1 << parseInt(p.dataset.i);
  });
  return b;
}

function renderDayFilters() {
  const el = document.getElementById('dayFilters');
  el.innerHTML = '<span class="day-btn '+(filterDay===-1?'active':'')+'" onclick="setFilter(-1)">📋 Todas</span>' +
    DAYS.map((d,i) => `<span class="day-btn ${filterDay===i?'active':''}" onclick="setFilter(${i})">${d}</span>`).join('');
}

function setFilter(d) {
  filterDay = d;
  renderDayFilters();
  renderTasks();
}

function renderStats() {
  const total = tasks.length;
  const done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('stats').innerHTML = `
    <span>📊 ${total} tareas</span>
    <span>✅ ${done} hechas</span>
    <span>📈 ${pct}%</span>
  `;
}

function renderTasks() {
  const el = document.getElementById('taskList');
  let filtered = tasks;
  if (filterDay >= 0) filtered = tasks.filter(t => t.days & (1<<filterDay));

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>${tasks.length ? 'No hay tareas para este día' : 'Todavía no creaste ninguna tarea'}</p></div>`;
    renderStats();
    return;
  }

  // Sort: undone first, then by date/time
  filtered.sort((a,b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const da = a.date || '9999-99-99', db = b.date || '9999-99-99';
    if (da !== db) return da < db ? -1 : 1;
    const ta = a.time || '00:00', tb = b.time || '00:00';
    return ta < tb ? -1 : 1;
  });

  el.innerHTML = filtered.map(t => {
    const prio = { baja:'🟢',media:'🟡',alta:'🔴' }[t.priority||'media'] || '';
    const over = t.date && t.date < today() && !t.done ? ' style="border-color:#da3633;"' : '';
    return `<div class="task-card ${t.done?'done':''}"${over}>
      <button class="task-toggle ${t.done?'on':''}" onclick="toggleTask('${t.id}')">${t.done?'✓':''}</button>
      <div class="task-info">
        <div class="task-name">${esc(t.name)}</div>
        <div class="task-meta">
          ${t.date ? '<span>📅 '+t.date+'</span>' : ''}
          ${t.time ? '<span>⏰ '+t.time+'</span>' : ''}
          <span class="tag">${prio} ${t.priority||'media'}</span>
          <span class="tag">📅 ${dayNames(t.days)}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="task-btn" onclick="editTask('${t.id}')">✏️</button>
        <button class="task-btn del" onclick="delTask('${t.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
  renderStats();
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function addTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) { alert('Escribí un nombre para la tarea'); return; }
  const days = getBits('daySelector');
  if (!days) { alert('Seleccioná al menos un día'); return; }
  tasks.push({
    id: nextId(),
    name,
    days,
    time: document.getElementById('taskTime').value || '09:00',
    date: document.getElementById('taskDate').value || '',
    priority: document.getElementById('taskPriority').value,
    done: false,
    created: new Date().toISOString()
  });
  save();
  renderTasks();
  document.getElementById('taskName').value = '';
  document.getElementById('taskName').focus();
}

function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (t) { t.done = !t.done; save(); renderTasks(); }
}

function delTask(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  tasks = tasks.filter(x => x.id !== id);
  save(); renderTasks();
}

function editTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('editName').value = t.name;
  document.getElementById('editTime').value = t.time || '09:00';
  document.getElementById('editDate').value = t.date || '';
  document.getElementById('editPriority').value = t.priority || 'media';
  initDaySelector('editDaySelector', t.days || 0);
  document.getElementById('editModal').classList.add('open');
}

function saveEdit() {
  const name = document.getElementById('editName').value.trim();
  if (!name) { alert('Escribí un nombre'); return; }
  const days = getBits('editDaySelector');
  if (!days) { alert('Seleccioná al menos un día'); return; }
  const t = tasks.find(x => x.id === editingId);
  if (!t) return;
  t.name = name;
  t.days = days;
  t.time = document.getElementById('editTime').value;
  t.date = document.getElementById('editDate').value;
  t.priority = document.getElementById('editPriority').value;
  save(); renderTasks(); closeEdit();
}

function closeEdit() {
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

// Init
initDaySelector('daySelector', 31); // Lun-Vie default
document.getElementById('taskDate').value = today();
renderDayFilters();
renderTasks();
</script>
</body>
</html>
